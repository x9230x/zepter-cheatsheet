name: Update prices

on:
  schedule:
    # 03:17 UTC = 08:17 по Алматы. Некруглая минута — GitHub реже пропускает запуск.
    - cron: '17 3 * * *'
    # запасной прогон в обед на случай, если утренний пропустят
    - cron: '17 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update prices
        run: node scripts/update-prices.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update prices $(date -u +%F)"
            git push
          fi
